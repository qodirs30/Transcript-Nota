[build]
  # Build hanya client (React/Vite)
  command   = "cd netlify/functions && npm install && cd ../../client && npm ci && npm run build"
  publish   = "client/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# ─── Redirect: semua /api/* → serverless function ───────────
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200

# ─── SPA fallback: semua route → index.html ─────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
